<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f9">
  <title>takarei Full Clone Sandbox</title>
  <style>
    html,body{width:100%;height:100%;margin:0;background:#f4f6f9;font-family:system-ui,sans-serif;color:#172033}
    .boot{display:grid;place-items:center;align-content:center;gap:14px;height:100%;text-align:center}
    .boot-mark{display:grid;place-items:center;width:52px;height:52px;border-radius:16px;background:#172033;color:#fff;font-size:22px;font-weight:800;box-shadow:0 14px 30px rgba(23,32,51,.18)}
    .boot b{font-size:14px}.boot small{color:#818999;font-size:10px}.boot-line{width:110px;height:3px;overflow:hidden;border-radius:99px;background:#e0e3e8}.boot-line::after{content:"";display:block;width:45%;height:100%;border-radius:inherit;background:#f26722;animation:load 1s ease-in-out infinite alternate}@keyframes load{to{transform:translateX(122%)}}
  </style>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="boot"><span class="boot-mark">T</span><b>元アプリを読み込んでいます</b><small>FULL CLONE · SANDBOX STORAGE</small><span class="boot-line"></span></div>
</body>
</html>
