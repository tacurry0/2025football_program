<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>スコアボード作成</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="scoreboard.css?v=20260515f" />
  </head>
  <body class="admin-page">
    <header class="admin-header">
      <div>
        <h1>スコアボード</h1>
      </div>
      <div class="admin-actions">
        <button class="admin-button export-button" id="exportImageButton" type="button">画像出力</button>
        <a class="admin-link" href="scoreboard-display.html?v=20260515f" target="_blank" rel="noopener">画面を見る</a>
        <button class="admin-button" id="resetButton" type="button">初期値に戻す</button>
      </div>
    </header>

    <main class="admin-shell">
      <form class="control-panel" id="controlForm" autocomplete="off">
        <section class="control-section import-section">
          <h2>公式記録から反映</h2>
          <div class="official-url-row">
            <label>
              <span>J.LEAGUE Data Site URL</span>
              <input id="officialUrlInput" type="url" placeholder="https://data.j-league.or.jp/SFMS02/?match_card_id=33403" />
            </label>
            <button class="admin-button" id="officialImportButton" type="button">反映</button>
          </div>
          <p class="official-import-status" id="officialImportStatus" aria-live="polite"></p>
        </section>

        <section class="control-section">
          <h2>クラブ名</h2>
          <div class="field-grid">
            <label>
              <span>左クラブ名</span>
              <input name="home.club" type="text" />
            </label>
            <label>
              <span>右クラブ名</span>
              <input name="away.club" type="text" />
            </label>
          </div>
        </section>

        <section class="control-section">
          <h2>クラブカラー</h2>
          <div class="color-grid">
            <label>
              <span>左チーム色</span>
              <input name="colors.home" type="color" />
            </label>
            <label>
              <span>右チーム色</span>
              <input name="colors.away" type="color" />
            </label>
            <label>
              <span>中央背景色</span>
              <input name="colors.center" type="color" />
            </label>
            <label>
              <span>左クラブ名文字色</span>
              <input name="textColors.homeClub" type="color" />
            </label>
            <label>
              <span>右クラブ名文字色</span>
              <input name="textColors.awayClub" type="color" />
            </label>
            <label>
              <span>左背番号文字色</span>
              <input name="textColors.homeNumber" type="color" />
            </label>
            <label>
              <span>右背番号文字色</span>
              <input name="textColors.awayNumber" type="color" />
            </label>
          </div>
        </section>

        <section class="control-section">
          <h2>試合情報</h2>
          <div class="score-grid">
            <label>
              <span>節</span>
              <input name="match.round" type="text" />
            </label>
            <label>
              <span>前半 HOME</span>
              <input name="match.firstHome" type="number" min="0" />
            </label>
            <label>
              <span>前半 AWAY</span>
              <input name="match.firstAway" type="number" min="0" />
            </label>
            <label>
              <span>後半 HOME</span>
              <input name="match.secondHome" type="number" min="0" />
            </label>
            <label>
              <span>後半 AWAY</span>
              <input name="match.secondAway" type="number" min="0" />
            </label>
            <label>
              <span>TOTAL HOME</span>
              <input name="match.totalHome" type="number" min="0" />
            </label>
            <label>
              <span>TOTAL AWAY</span>
              <input name="match.totalAway" type="number" min="0" />
            </label>
          </div>
        </section>

        <section class="control-section">
          <h2>画像部分</h2>
          <div class="image-control-stack">
            <div class="logo-controls">
              <label>
                <span>上部大会表記画像</span>
                <input id="leagueImageInput" type="file" accept="image/*" />
              </label>
              <button class="admin-button" id="clearLeagueImage" type="button">画像を消す</button>
            </div>
            <div class="logo-controls">
              <label>
                <span>下部ロゴ画像</span>
                <input id="logoInput" type="file" accept="image/*" />
              </label>
              <button class="admin-button" id="clearLogo" type="button">画像を消す</button>
            </div>
          </div>
        </section>

        <section class="control-section">
          <h2>左チーム メンバー</h2>
          <div class="player-editor" id="homeEditor"></div>
        </section>

        <section class="control-section">
          <h2>右チーム メンバー</h2>
          <div class="player-editor" id="awayEditor"></div>
        </section>
      </form>

      <section class="preview-panel" aria-label="プレビュー">
        <div class="preview-toolbar">
          <span>表示プレビュー</span>
          <span>1920×1080固定表示</span>
        </div>
        <div class="preview-stage">
          <iframe class="vision-preview" src="scoreboard-display.html?v=20260515f" title="スコアボードプレビュー"></iframe>
        </div>
      </section>
    </main>

    <script src="vendor/html2canvas.min.js?v=20260515e"></script>
    <script src="scoreboard.js?v=20260515f"></script>
  </body>
</html>
