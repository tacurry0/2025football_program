<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大型ビジョン 全画面プレビュー</title>
    <link rel="stylesheet" href="styles.css?v=20260520d" />
  </head>
  <body class="fullscreen-preview-page">
    <main class="fullscreen-preview" aria-label="大型ビジョン全画面プレビュー">
      <nav class="fullscreen-preview-switcher" aria-label="プレビュー切替">
        <button class="active" type="button" data-fullscreen-src="display.html?v=20260520d">スタメン</button>
        <button type="button" data-fullscreen-src="result.html?v=20260520d">結果</button>
        <button type="button" data-fullscreen-src="attendance.html?v=20260520d">来場者</button>
        <button type="button" data-fullscreen-src="top.html?v=20260520d">対戦トップ</button>
        <button type="button" data-fullscreen-src="referees.html?v=20260520d">審判</button>
      </nav>
      <div class="fullscreen-preview-fit">
        <div class="fullscreen-preview-frame-box">
          <iframe id="fullscreenPreviewFrame" src="display.html?v=20260520d" title="大型ビジョン全画面プレビュー"></iframe>
        </div>
      </div>
    </main>
    <script>
      (() => {
        const frame = document.getElementById("fullscreenPreviewFrame");
        const fit = document.querySelector(".fullscreen-preview-fit");
        const updateScale = () => {
          const fitWidth = fit ? fit.clientWidth : window.innerWidth;
          const fitHeight = fit ? fit.clientHeight : window.innerHeight;
          const scale = Math.max(0.05, Math.min(fitWidth / 1920, fitHeight / 1080));
          document.documentElement.style.setProperty("--fullscreen-preview-scale", String(scale));
        };
        document.querySelectorAll("[data-fullscreen-src]").forEach((button) => {
          button.addEventListener("click", () => {
            document.querySelectorAll("[data-fullscreen-src]").forEach((node) => {
              node.classList.toggle("active", node === button);
            });
            frame.src = button.dataset.fullscreenSrc;
          });
        });
        updateScale();
        window.addEventListener("resize", updateScale);
        if ("ResizeObserver" in window && fit) {
          new ResizeObserver(updateScale).observe(fit);
        }
      })();
    </script>
  </body>
</html>
