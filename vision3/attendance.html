<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1" />
    <title>大型ビジョン 来場者数</title>
    <link rel="stylesheet" href="styles.css?v=20260521b" />
  </head>
  <body class="display-page attendance-page">
    <main class="canvas attendance-canvas" aria-label="大型ビジョン来場者数">
      <section class="attendance-board">
        <img class="attendance-emblem attendance-home-emblem" id="attendanceHomeEmblem" alt="" />
        <img class="attendance-emblem attendance-away-emblem" id="attendanceAwayEmblem" alt="" />
        <div class="attendance-panel">
          <h1 data-field="attendance.title"></h1>
          <div class="attendance-count">
            <span data-field="attendance.count"></span><strong>人</strong>
          </div>
          <p data-field="attendance.message"></p>
        </div>
      </section>
    </main>
    <script src="vendor/html2canvas.min.js?v=20260521b"></script>
    <script src="app.js?v=20260521b"></script>
  </body>
</html>
