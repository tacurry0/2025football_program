<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1" />
    <title>大型ビジョン表示</title>
    <link rel="stylesheet" href="styles.css?v=20260520d" />
  </head>
  <body class="display-page">
    <main class="canvas" aria-label="大型ビジョン表示">
      <section class="vision-board" id="visionBoard">
        <div class="team team-home">
          <h1 class="club-name home-club" data-field="home.club"></h1>
          <div class="lineup" id="homeLineup"></div>
        </div>

        <div class="center-area">
          <div class="league">
            <img id="leagueImage" alt="大会表記" />
          </div>
          <div class="round" data-field="match.round"></div>
          <div class="scores">
            <div class="score-box">
              <span data-field="match.firstHome"></span>
              <strong>前半</strong>
              <span data-field="match.firstAway"></span>
            </div>
            <div class="score-box">
              <span data-field="match.secondHome"></span>
              <strong>後半</strong>
              <span data-field="match.secondAway"></span>
            </div>
            <div class="gold-line"></div>
            <div class="score-box score-total">
              <span data-field="match.totalHome"></span>
              <strong>TOTAL</strong>
              <span data-field="match.totalAway"></span>
            </div>
          </div>
          <div class="logo-slot" id="logoSlot" aria-hidden="true">
            <img id="customLogo" alt="" />
            <img id="defaultLogo" src="icons/adidas-default.png?v=20260520d" alt="" />
          </div>
        </div>

        <div class="team team-away">
          <h1 class="club-name away-club" data-field="away.club"></h1>
          <div class="lineup" id="awayLineup"></div>
        </div>
      </section>
    </main>
    <script src="vendor/html2canvas.min.js?v=20260520d"></script>
    <script src="app.js?v=20260520d"></script>
  </body>
</html>
